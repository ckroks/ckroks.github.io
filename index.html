<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Gaming Hub Pro</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        header {
            background: rgba(0,0,0,0.8);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff006e;
        }
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        
        .nav {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .nav button {
            padding: 10px 20px;
            background: #ff006e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .nav button:hover { background: #8338ec; }
        
        .section {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            margin: 20px 0;
            border-radius: 10px;
        }
        .section h2 { text-align: center; margin-bottom: 20px; font-size: 2rem; }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .game-card {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #ff006e;
        }
        .game-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.3);
            border-color: #00d9ff;
        }
        
        .game-emoji { font-size: 3rem; margin-bottom: 10px; }
        .game-title { font-weight: bold; margin-bottom: 5px; }
        .game-desc { font-size: 0.9rem; margin-bottom: 10px; opacity: 0.9; }
        .btn-play {
            background: #00d9ff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .btn-play:hover { background: #ff006e; color: white; }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            overflow-y: auto;
        }
        .modal-content {
            background: #1a1a2e;
            margin: 50px auto;
            padding: 30px;
            border-radius: 10px;
            width: 95%;
            max-width: 900px;
            border: 3px solid #ff006e;
            position: relative;
        }
        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 30px;
            cursor: pointer;
            color: #00d9ff;
        }
        .close:hover { color: #ff006e; }
        
        canvas { max-width: 100%; margin: 20px auto; display: block; }
        
        .multiplayer-info {
            background: rgba(0, 217, 255, 0.2);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 2px solid #00d9ff;
        }
        
        footer {
            background: rgba(0,0,0,0.8);
            text-align: center;
            padding: 20px;
            margin-top: 30px;
            border-top: 3px solid #ff006e;
        }
    </style>
</head>
<body>
    <header>
        <h1>🎮 GAMING HUB PRO</h1>
        <p>Speel 15+ GRATIS Games!</p>
        <div class="nav">
            <button onclick="location.reload()">🏠 Home</button>
            <button onclick="scrollTo('single')">⭐ Single Player</button>
            <button onclick="scrollTo('multi')">👥 Multiplayer</button>
        </div>
    </header>

    <div class="container">
        <section id="single" class="section">
            <h2>⭐ Single Player Games</h2>
            <div class="games-grid" id="single-games"></div>
        </section>

        <section id="multi" class="section">
            <h2>👥 Multiplayer Games (2 Spelers)</h2>
            <div class="games-grid" id="multi-games"></div>
        </section>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <div id="gameContainer"></div>
        </div>
    </div>

    <footer>
        <p>🎮 Gaming Hub Pro 2026 | Made with ❤️</p>
    </footer>

    <script>
        const games = {
            single: [
                { name: 'Snake', emoji: '🐍', id: 'snake', desc: 'Klassieke Snake' },
                { name: 'Memory', emoji: '🧠', id: 'memory', desc: 'Vind paren' },
                { name: 'Flappy', emoji: '🐦', id: 'flappy', desc: 'Vliegen!' },
                { name: 'Breakout', emoji: '💥', id: 'breakout', desc: 'Vernietig blokken' },
                { name: 'Asteroid', emoji: '🪨', id: 'asteroid', desc: 'Arcade spel' },
                { name: 'Hangman', emoji: '🎯', id: 'hangman', desc: 'Woord raden' },
                { name: '2048', emoji: '🔢', id: '2048', desc: 'Getallen combineren' },
                { name: 'Match Colors', emoji: '🎨', id: 'colors', desc: 'Snelle kleuren' }
            ],
            multi: [
                { name: 'Pong 2P', emoji: '🎾', id: 'pong', desc: 'Klassieke Pong' },
                { name: 'Tic Tac Toe', emoji: '⭕', id: 'tictactoe', desc: 'X & O' },
                { name: 'Quiz Battle', emoji: '❓', id: 'quiz', desc: 'Trivia vs vriend' },
                { name: 'Soccer', emoji: '⚽', id: 'soccer', desc: 'Voetbal match' },
                { name: 'Racing', emoji: '🏎️', id: 'racing', desc: '2-speler race' },
                { name: 'Connect 4', emoji: '🔴', id: 'connect4', desc: 'Verbind 4!' },
                { name: 'Bomb Battle', emoji: '💣', id: 'bomb', desc: 'Gooi bommen' }
            ]
        };

        function scrollTo(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function initGames() {
            const singleHTML = games.single.map(g => `
                <div class="game-card" onclick="startGame('${g.id}')">
                    <div class="game-emoji">${g.emoji}</div>
                    <div class="game-title">${g.name}</div>
                    <div class="game-desc">${g.desc}</div>
                    <button class="btn-play">▶️ SPELEN</button>
                </div>
            `).join('');

            const multiHTML = games.multi.map(g => `
                <div class="game-card" onclick="startGame('${g.id}')">
                    <div class="game-emoji">${g.emoji}</div>
                    <div class="game-title">${g.name}</div>
                    <div class="game-desc">${g.desc}</div>
                    <button class="btn-play">▶️ SPELEN (2P)</button>
                </div>
            `).join('');

            document.getElementById('single-games').innerHTML = singleHTML;
            document.getElementById('multi-games').innerHTML = multiHTML;
        }

        function startGame(gameId) {
            const modal = document.getElementById('gameModal');
            const container = document.getElementById('gameContainer');
            container.innerHTML = '';

            switch(gameId) {
                case 'snake': snakeGame(container); break;
                case 'memory': memoryGame(container); break;
                case 'flappy': flappyGame(container); break;
                case 'breakout': breakoutGame(container); break;
                case 'asteroid': asteroidGame(container); break;
                case 'hangman': hangmanGame(container); break;
                case '2048': game2048(container); break;
                case 'colors': colorMatchGame(container); break;
                case 'pong': pongGame(container); break;
                case 'tictactoe': tictactoeGame(container); break;
                case 'quiz': quizGame(container); break;
                case 'soccer': soccerGame(container); break;
                case 'racing': racingGame(container); break;
                case 'connect4': connect4Game(container); break;
                case 'bomb': bombGame(container); break;
            }

            modal.style.display = 'block';
        }

        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
        }

        window.onclick = function(e) {
            const modal = document.getElementById('gameModal');
            if (e.target == modal) modal.style.display = 'none';
        }

        // ===== SNAKE =====
        function snakeGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 400;
            canvas.style.background = '#1a1a2e';
            canvas.style.border = '3px solid #00d9ff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let snake = [{x: 10, y: 10}];
            let food = {x: 15, y: 15};
            let dir = {x: 1, y: 0}, nextDir = {x: 1, y: 0};
            let score = 0;

            document.addEventListener('keydown', e => {
                if(e.key === 'ArrowUp' && dir.y === 0) nextDir = {x: 0, y: -1};
                if(e.key === 'ArrowDown' && dir.y === 0) nextDir = {x: 0, y: 1};
                if(e.key === 'ArrowLeft' && dir.x === 0) nextDir = {x: -1, y: 0};
                if(e.key === 'ArrowRight' && dir.x === 0) nextDir = {x: 1, y: 0};
            });

            function update() {
                dir = nextDir;
                const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

                if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || 
                   snake.some(s => s.x === head.x && s.y === head.y)) {
                    alert(`🐍 GAME OVER!\nScore: ${score}`);
                    closeGame();
                    return false;
                }

                if(head.x === food.x && head.y === food.y) {
                    score += 10;
                    food = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
                } else {
                    snake.pop();
                }

                snake.unshift(head);
                return true;
            }

            function draw() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#00d9ff';
                snake.forEach(s => ctx.fillRect(s.x * 20, s.y * 20, 18, 18));

                ctx.fillStyle = '#ff006e';
                ctx.fillRect(food.x * 20, food.y * 20, 18, 18);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(`Score: ${score}`, 10, 25);
            }

            function gameLoop() {
                if(update()) { draw(); setTimeout(gameLoop, 100); }
            }
            gameLoop();
        }

        // ===== MEMORY =====
        function memoryGame(container) {
            const emojis = ['🍎','🍌','🍇','🍓','🍑','🥝','🍊','🍋','🍎','🍌','🍇','🍓','🍑','🥝','🍊','🍋'];
            const shuffled = emojis.sort(() => Math.random() - 0.5);
            let flipped = [], matched = [], moves = 0;

            const board = document.createElement('div');
            board.style.display = 'grid';
            board.style.gridTemplateColumns = 'repeat(4, 80px)';
            board.style.gap = '10px';
            board.style.margin = '20px auto';
            board.style.width = 'fit-content';

            const cards = shuffled.map((emoji, i) => {
                const card = document.createElement('button');
                card.textContent = '?';
                card.style.width = '80px'; card.style.height = '80px';
                card.style.fontSize = '32px'; card.style.fontWeight = 'bold';
                card.style.background = 'linear-gradient(45deg, #ff006e, #8338ec)';
                card.style.color = 'white'; card.style.border = 'none';
                card.style.borderRadius = '8px'; card.style.cursor = 'pointer';

                card.onclick = () => {
                    if(flipped.includes(i) || matched.includes(i)) return;
                    flipped.push(i);
                    card.textContent = emoji;
                    card.style.background = '#764ba2';

                    if(flipped.length === 2) {
                        moves++;
                        const [i1, i2] = flipped;
                        if(shuffled[i1] === shuffled[i2]) {
                            matched.push(i1, i2);
                            flipped = [];
                            if(matched.length === 16) {
                                setTimeout(() => alert(`🎉 GEWONNEN!\nMoves: ${moves}`), 300);
                            }
                        } else {
                            setTimeout(() => {
                                cards[i1].textContent = '?';
                                cards[i1].style.background = 'linear-gradient(45deg, #ff006e, #8338ec)';
                                cards[i2].textContent = '?';
                                cards[i2].style.background = 'linear-gradient(45deg, #ff006e, #8338ec)';
                                flipped = [];
                            }, 500);
                        }
                    }
                };
                return card;
            });

            cards.forEach(c => board.appendChild(c));
            container.appendChild(board);
        }

        // ===== FLAPPY =====
        function flappyGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 500;
            canvas.style.background = '#87CEEB';
            canvas.style.border = '3px solid #ff006e';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let bird = {y: 200, vy: 0};
            let pipes = [];
            let score = 0;

            document.addEventListener('keydown', e => {
                if(e.key === ' ' || e.key === 'ArrowUp') bird.vy = -10;
            });

            function update() {
                bird.vy += 0.5;
                bird.y += bird.vy;

                if(bird.y > 500 || bird.y < 0) {
                    alert(`🐦 GAME OVER!\nScore: ${score}`);
                    closeGame();
                    return false;
                }

                if(pipes.length === 0 || pipes[pipes.length - 1].x < 150) {
                    pipes.push({x: 400, gap: 100 + Math.random() * 150});
                }

                pipes.forEach(p => {
                    p.x -= 5;
                    if(bird.x > p.x && bird.x < p.x + 50) {
                        if(bird.y < p.gap || bird.y > p.gap + 100) {
                            alert(`🐦 GAME OVER!\nScore: ${score}`);
                            closeGame();
                        }
                    }
                    if(p.x === bird.x) score++;
                });

                pipes = pipes.filter(p => p.x > -50);
                return true;
            }

            function draw() {
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, 400, 500);
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(50, bird.y, 12, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#228B22';
                pipes.forEach(p => {
                    ctx.fillRect(p.x, 0, 50, p.gap);
                    ctx.fillRect(p.x, p.gap + 100, 50, 500 - p.gap - 100);
                });
                ctx.fillStyle = '#000';
                ctx.font = 'bold 20px Arial';
                ctx.fillText(`Score: ${score}`, 15, 30);
            }

            function gameLoop() {
                if(update()) { draw(); requestAnimationFrame(gameLoop); }
            }
            gameLoop();
        }

        // ===== BREAKOUT =====
        function breakoutGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 500; canvas.height = 400;
            canvas.style.background = '#1a1a2e';
            canvas.style.border = '3px solid #00d9ff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let paddle = {x: 200, y: 360, w: 100, h: 15, dx: 0};
            let ball = {x: 250, y: 200, r: 8, dx: 4, dy: -4};
            let bricks = [];
            let score = 0;

            for(let i = 0; i < 5; i++) {
                for(let j = 0; j < 5; j++) {
                    bricks.push({x: j * 100, y: i * 25, w: 95, h: 20, active: true});
                }
            }

            document.addEventListener('keydown', e => {
                if(e.key === 'ArrowLeft') paddle.dx = -7;
                if(e.key === 'ArrowRight') paddle.dx = 7;
            });
            document.addEventListener('keyup', () => paddle.dx = 0);

            function update() {
                paddle.x += paddle.dx;
                if(paddle.x < 0) paddle.x = 0;
                if(paddle.x + paddle.w > 500) paddle.x = 500 - paddle.w;

                ball.x += ball.dx;
                ball.y += ball.dy;

                if(ball.x - ball.r < 0 || ball.x + ball.r > 500) ball.dx = -ball.dx;
                if(ball.y - ball.r < 0) ball.dy = -ball.dy;

                if(ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.dy > 0) {
                    ball.dy = -ball.dy;
                }

                bricks.forEach(b => {
                    if(b.active && ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
                        b.active = false;
                        ball.dy = -ball.dy;
                        score += 100;
                    }
                });

                if(ball.y > 400) {
                    alert(`💥 GAME OVER!\nScore: ${score}`);
                    closeGame();
                    return false;
                }

                if(bricks.every(b => !b.active)) {
                    alert(`🎉 LEVEL VOLTOOID!\nScore: ${score}`);
                    closeGame();
                    return false;
                }

                return true;
            }

            function draw() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, 500, 400);
                ctx.fillStyle = '#00d9ff';
                ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
                ctx.fillStyle = '#ffbe0b';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fill();
                bricks.forEach(b => {
                    if(b.active) {
                        ctx.fillStyle = '#ff006e';
                        ctx.fillRect(b.x, b.y, b.w, b.h);
                    }
                });
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(`Score: ${score}`, 15, 25);
            }

            function gameLoop() {
                if(update()) { draw(); requestAnimationFrame(gameLoop); }
            }
            gameLoop();
        }

        // ===== ASTEROID =====
        function asteroidGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 500; canvas.height = 500;
            canvas.style.background = '#000';
            canvas.style.border = '3px solid #00d9ff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let player = {x: 250, y: 450, angle: 0, speed: 0};
            let bullets = [];
            let asteroids = [];
            let score = 0;

            for(let i = 0; i < 5; i++) {
                asteroids.push({
                    x: Math.random() * 500,
                    y: Math.random() * 200,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 3,
                    size: 3
                });
            }

            document.addEventListener('keydown', e => {
                if(e.key === 'ArrowLeft') player.angle -= 0.1;
                if(e.key === 'ArrowRight') player.angle += 0.1;
                if(e.key === ' ') bullets.push({x: player.x, y: player.y, vx: Math.cos(player.angle) * 7, vy: Math.sin(player.angle) * 7});
            });

            function update() {
                asteroids.forEach(a => {
                    a.x += a.vx;
                    a.y += a.vy;
                    if(a.x < 0) a.x = 500;
                    if(a.x > 500) a.x = 0;
                    if(a.y < 0) a.y = 500;
                    if(a.y > 500) a.y = 0;
                });

                bullets.forEach((b, i) => {
                    b.x += b.vx;
                    b.y += b.vy;
                    if(b.x < 0 || b.x > 500 || b.y < 0 || b.y > 500) bullets.splice(i, 1);
                });

                asteroids.forEach((a, ai) => {
                    bullets.forEach((b, bi) => {
                        if(Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2) < a.size * 10) {
                            asteroids.splice(ai, 1);
                            bullets.splice(bi, 1);
                            score += 100;
                        }
                    });
                });

                asteroids.forEach(a => {
                    if(Math.sqrt((a.x - player.x) ** 2 + (a.y - player.y) ** 2) < a.size * 10) {
                        alert(`🪨 GAME OVER!\nScore: ${score}`);
                        closeGame();
                    }
                });

                if(asteroids.length === 0) {
                    alert(`🎉 LEVEL VOLTOOID!\nScore: ${score}`);
                    closeGame();
                }

                return true;
            }

            function draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 500, 500);

                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                ctx.fillStyle = '#00d9ff';
                ctx.beginPath();
                ctx.moveTo(15, 0);
                ctx.lineTo(-10, -10);
                ctx.lineTo(-5, 0);
                ctx.lineTo(-10, 10);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                ctx.fillStyle = '#ffbe0b';
                asteroids.forEach(a => {
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, a.size * 10, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.fillStyle = '#ff006e';
                bullets.forEach(b => {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(`Score: ${score}`, 15, 25);
            }

            function gameLoop() {
                if(update()) { draw(); requestAnimationFrame(gameLoop); }
            }
            gameLoop();
        }

        // ===== HANGMAN =====
        function hangmanGame(container) {
            const words = ['javascript', 'gamedesign', 'programmeren', 'website', 'computer', 'gaming'];
            const word = words[Math.floor(Math.random() * words.length)];
            let guessed = [], wrong = [];

            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.padding = '30px';
            div.style.color = '#fff';

            const display = document.createElement('div');
            display.style.fontSize = '2rem';
            display.style.margin = '20px 0';
            display.style.letterSpacing = '10px';
            display.style.fontFamily = 'monospace';
            display.style.color = '#00d9ff';

            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = '1';
            input.placeholder = 'A-Z';
            input.style.padding = '10px';
            input.style.fontSize = '18px';
            input.style.borderRadius = '5px';
            input.style.border = '2px solid #00d9ff';

            const button = document.createElement('button');
            button.textContent = 'Gok!';
            button.style.padding = '10px 20px';
            button.style.marginLeft = '10px';
            button.style.background = '#ff006e';
            button.style.color = 'white';
            button.style.border = 'none';
            button.style.borderRadius = '5px';
            button.style.cursor = 'pointer';
            button.onclick = () => {
                const letter = input.value.toLowerCase();
                input.value = '';
                if(!letter || guessed.includes(letter) || wrong.includes(letter)) return;
                word.includes(letter) ? guessed.push(letter) : wrong.push(letter);
                update();
            };

            const status = document.createElement('div');
            status.style.fontSize = '16px';
            status.style.marginTop = '20px';

            function update() {
                display.textContent = word.split('').map(l => guessed.includes(l) ? l : '_').join(' ');
                status.innerHTML = `<p>❌ Fout: ${wrong.length}/6 - ${wrong.join(', ')}</p>`;

                if(wrong.length >= 6) {
                    status.innerHTML += `<p>😢 Game Over! Woord: ${word}</p>`;
                    input.disabled = true;
                    button.disabled = true;
                }

                if(word.split('').every(l => guessed.includes(l))) {

        // ===== 2048 =====
        function game2048(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 340; canvas.height = 340;
            canvas.style.margin = '20px auto';
            canvas.style.display = 'block';
            canvas.style.border = '2px solid #00d9ff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let board = Array(16).fill(0);
            board[0] = 2;
            board[1] = 2;

            const colors = {0: '#cdc1b4', 2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563', 32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61', 512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'};

            document.addEventListener('keydown', e => {
                if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    move(e.key);
                }
            });

            function move(key) {
                let moved = false;
                if(key === 'ArrowUp' || key === 'ArrowDown') {
                    for(let i = 0; i < 4; i++) {
                        let col = [board[i], board[i+4], board[i+8], board[i+12]];
                        if(key === 'ArrowDown') col = col.reverse();
                        col = slide(col);
                        if(key === 'ArrowDown') col = col.reverse();
                        [board[i], board[i+4], board[i+8], board[i+12]] = col;
                    }
                } else {
                    for(let i = 0; i < 4; i++) {
                        let row = [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]];
                        if(key === 'ArrowLeft') {
                            row = slide(row);
                        } else {
                            row = row.reverse();
                            row = slide(row);
                            row = row.reverse();
                        }
                        [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]] = row;
                    }
                }
                draw();
            }

            function slide(arr) {
                let result = arr.filter(x => x);
                for(let i = 0; i < result.length - 1; i++) {
                    if(result[i] === result[i+1]) {
                        result[i] *= 2;
                        result.splice(i+1, 1);
                    }
                }
                while(result.length < 4) result.push(0);
                return result;
            }

            function draw() {
                ctx.fillStyle = '#bbada0';
                ctx.fillRect(0, 0, 340, 340);
                board.forEach((val, i) => {
                    const x = (i % 4) * 85 + 5;
                    const y = Math.floor(i / 4) * 85 + 5;
                    ctx.fillStyle = colors[val] || '#3c3c2f';
                    ctx.fillRect(x, y, 75, 75);
                    if(val) {
                        ctx.fillStyle = val > 4 ? '#776e65' : '#f9f6f2';
                        ctx.font = 'bold 32px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(val, x + 37, y + 37);
                    }
                });
            }
            draw();
        }

                    ball.vx = 5; ball.vy = (ball.y - p1.y) / 10;
