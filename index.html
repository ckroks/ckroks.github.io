<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Gaming Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            min-height: 100vh;
        }
        
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        header {
            background: rgba(0,0,0,0.9);
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid #ff006e;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        
        header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        
        .nav {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        
        .nav button {
            padding: 10px 20px;
            background: #ff006e;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
        }
        
        .nav button:hover { background: #8338ec; transform: scale(1.05); }
        
        .section {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            margin-bottom: 20px;
            border-radius: 10px;
            border: 2px solid #ff006e;
        }
        
        .section h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 2rem;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
        }
        
        .game-card {
            background: rgba(255,255,255,0.15);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            border: 2px solid #00d9ff;
            transition: all 0.3s;
        }
        
        .game-card:hover {
            transform: translateY(-8px);
            background: rgba(255,255,255,0.25);
            border-color: #ff006e;
        }
        
        .game-emoji { font-size: 3rem; margin-bottom: 10px; }
        .game-title { font-weight: bold; margin-bottom: 8px; font-size: 1.1rem; }
        .game-desc { font-size: 0.85rem; margin-bottom: 12px; opacity: 0.9; }
        
        .btn-play {
            background: linear-gradient(45deg, #ff006e, #8338ec);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 0.95rem;
        }
        
        .btn-play:hover { background: linear-gradient(45deg, #8338ec, #ff006e); }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            overflow-y: auto;
        }
        
        .modal-content {
            background: #1a1a2e;
            margin: 20px auto;
            padding: 30px;
            border-radius: 15px;
            width: 95%;
            max-width: 900px;
            border: 3px solid #ff006e;
            position: relative;
        }
        
        .close {
            position: absolute;
            right: 20px;
            top: 20px;
            font-size: 35px;
            cursor: pointer;
            color: #00d9ff;
            font-weight: bold;
        }
        
        .close:hover { color: #ff006e; }
        
        canvas {
            max-width: 100%;
            margin: 20px auto;
            display: block;
            border-radius: 8px;
        }
        
        footer {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.9);
            border-top: 3px solid #ff006e;
            border-radius: 10px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 GAMING HUB</h1>
            <p>Speel GRATIS games online!</p>
            <div class="nav">
                <button onclick="location.reload()">🏠 Home</button>
                <button onclick="goToSection('single')">⭐ Games</button>
                <button onclick="goToSection('multi')">👥 Multiplayer</button>
            </div>
        </header>

        <section id="single" class="section">
            <h2>⭐ Speel Nu!</h2>
            <div class="games-grid" id="games-container"></div>
        </section>

        <section id="multi" class="section">
            <h2>👥 Speel Met Vrienden</h2>
            <div class="games-grid" id="multi-container"></div>
        </section>
    </div>

    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeGame()">&times;</span>
            <div id="gameContent"></div>
        </div>
    </div>

    <footer>
        <p>🎮 Gaming Hub 2026 | Veel speelplezier!</p>
    </footer>

    <script>
        const gamesList = [
            // Single Player
            {name: '🐍 Snake', desc: 'Klassieke snake', emoji: '🐍', id: 'snake', type: 'single'},
            {name: '🧠 Memory', desc: 'Vind paren', emoji: '🧠', id: 'memory', type: 'single'},
            {name: '🐦 Flappy', desc: 'Vliegen!', emoji: '🐦', id: 'flappy', type: 'single'},
            {name: '💥 Breakout', desc: 'Blokken slaan', emoji: '💥', id: 'breakout', type: 'single'},
            {name: '🎯 Hangman', desc: 'Woord raden', emoji: '🎯', id: 'hangman', type: 'single'},
            {name: '🔢 2048', desc: 'Getallen spel', emoji: '🔢', id: '2048', type: 'single'},
            {name: '🎨 Match', desc: 'Kleuren match', emoji: '🎨', id: 'match', type: 'single'},
            {name: '🪨 Asteroid', desc: 'Arcade spel', emoji: '🪨', id: 'asteroid', type: 'single'},
            
            // Multiplayer
            {name: '🎾 Pong', desc: '2-speler pong', emoji: '🎾', id: 'pong', type: 'multi'},
            {name: '⭕ Tic Tac Toe', desc: 'X en O', emoji: '⭕', id: 'tictactoe', type: 'multi'},
            {name: '⚽ Soccer', desc: 'Voetbal 2P', emoji: '⚽', id: 'soccer', type: 'multi'},
            {name: '🏎️ Racing', desc: 'Race wedstrijd', emoji: '🏎️', id: 'racing', type: 'multi'},
            {name: '🔴 Connect4', desc: 'Verbind 4', emoji: '🔴', id: 'connect4', type: 'multi'},
            {name: '❓ Quiz', desc: 'Trivia battle', emoji: '❓', id: 'quiz', type: 'multi'},
        ];

        function init() {
            const single = gamesList.filter(g => g.type === 'single');
            const multi = gamesList.filter(g => g.type === 'multi');
            
            document.getElementById('games-container').innerHTML = single.map(g => gameCard(g)).join('');
            document.getElementById('multi-container').innerHTML = multi.map(g => gameCard(g)).join('');
        }

        function gameCard(game) {
            return `
                <div class="game-card" onclick="startGame('${game.id}')">
                    <div class="game-emoji">${game.emoji}</div>
                    <div class="game-title">${game.name}</div>
                    <div class="game-desc">${game.desc}</div>
                    <button class="btn-play">▶️ SPELEN</button>
                </div>
            `;
        }

        function goToSection(id) {
            document.getElementById(id).scrollIntoView({behavior: 'smooth'});
        }

        function startGame(id) {
            const modal = document.getElementById('gameModal');
            const content = document.getElementById('gameContent');
            content.innerHTML = '';

            switch(id) {
                case 'snake': snakeGame(content); break;
                case 'memory': memoryGame(content); break;
                case 'flappy': flappyGame(content); break;
                case 'breakout': breakoutGame(content); break;
                case 'hangman': hangmanGame(content); break;
                case '2048': game2048(content); break;
                case 'match': matchGame(content); break;
                case 'asteroid': asteroidGame(content); break;
                case 'pong': pongGame(content); break;
                case 'tictactoe': tictactoeGame(content); break;
                case 'soccer': soccerGame(content); break;
                case 'racing': racingGame(content); break;
                case 'connect4': connect4Game(content); break;
                case 'quiz': quizGame(content); break;
            }

            modal.style.display = 'block';
        }

        function closeGame() {
            document.getElementById('gameModal').style.display = 'none';
        }

        window.onclick = (e) => {
            const modal = document.getElementById('gameModal');
            if(e.target === modal) modal.style.display = 'none';
        };

        // ===== SNAKE =====
        function snakeGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 400;
            canvas.style.background = '#1a1a2e';
            canvas.style.border = '3px solid #00d9ff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let snake = [{x: 10, y: 10}];
            let food = {x: 15, y: 15};
            let dir = {x: 1, y: 0};
            let nextDir = {x: 1, y: 0};
            let score = 0;
            let gameRunning = true;

            document.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowUp' && dir.y === 0) nextDir = {x: 0, y: -1};
                if(e.key === 'ArrowDown' && dir.y === 0) nextDir = {x: 0, y: 1};
                if(e.key === 'ArrowLeft' && dir.x === 0) nextDir = {x: -1, y: 0};
                if(e.key === 'ArrowRight' && dir.x === 0) nextDir = {x: 1, y: 0};
            });

            function update() {
                dir = nextDir;
                const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

                if(head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) {
                    gameRunning = false;
                    alert(`🐍 GAME OVER!\nScore: ${score}`);
                    closeGame();
                    return false;
                }

                if(head.x === food.x && head.y === food.y) {
                    score += 10;
                    food = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
                } else {
                    snake.pop();
                }

                snake.unshift(head);
                return true;
            }

            function draw() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, 400, 400);

                ctx.fillStyle = '#00d9ff';
                snake.forEach(s => ctx.fillRect(s.x * 20, s.y * 20, 18, 18));

                ctx.fillStyle = '#ff006e';
                ctx.fillRect(food.x * 20, food.y * 20, 18, 18);

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(`Score: ${score}`, 10, 25);
            }

            function loop() {
                if(update()) {
                    draw();
                    setTimeout(loop, 100);
                }
            }
            loop();
        }

        // ===== MEMORY =====
        function memoryGame(container) {
            const emojis = ['🍎','🍌','🍇','🍓','🍑','🥝','🍊','🍋','🍎','🍌','🍇','🍓','🍑','🥝','🍊','🍋'];
            const shuffled = emojis.sort(() => Math.random() - 0.5);
            let flipped = [], matched = [];

            const board = document.createElement('div');
            board.style.display = 'grid';
            board.style.gridTemplateColumns = 'repeat(4, 80px)';
            board.style.gap = '10px';
            board.style.margin = '20px auto';
            board.style.width = 'fit-content';

            const cards = shuffled.map((emoji, i) => {
                const card = document.createElement('button');
                card.textContent = '?';
                card.style.width = '80px'; card.style.height = '80px';
                card.style.fontSize = '32px'; card.style.fontWeight = 'bold';
                card.style.background = 'linear-gradient(45deg, #ff006e, #8338ec)';
                card.style.color = 'white'; card.style.border = 'none';
                card.style.borderRadius = '8px'; card.style.cursor = 'pointer';

                card.onclick = () => {
                    if(flipped.includes(i) || matched.includes(i)) return;
                    flipped.push(i);
                    card.textContent = emoji;
                    card.style.background = '#764ba2';

                    if(flipped.length === 2) {
                        const [i1, i2] = flipped;
                        if(shuffled[i1] === shuffled[i2]) {
                            matched.push(i1, i2);
                            flipped = [];
                            if(matched.length === 16) {
                                setTimeout(() => {
                                    alert('🎉 JE HEBT GEWONNEN!');
                                    closeGame();
                                }, 300);
                            }
                        } else {
                            setTimeout(() => {
                                cards[i1].textContent = '?';
                                cards[i1].style.background = 'linear-gradient(45deg, #ff006e, #8338ec)';
                                cards[i2].textContent = '?';
                                cards[i2].style.background = 'linear-gradient(45deg, #ff006e, #8338ec)';
                                flipped = [];
                            }, 500);
                        }
                    }
                };
                return card;
            });

            cards.forEach(c => board.appendChild(c));
            container.appendChild(board);
        }

        // ===== FLAPPY =====
        function flappyGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 600;
            canvas.style.background = '#87CEEB';
            canvas.style.border = '3px solid #ff006e';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let bird = {y: 250, vy: 0};
            let pipes = [];
            let score = 0;
            let gameRunning = true;

            document.addEventListener('keydown', (e) => {
                if((e.key === ' ' || e.key === 'ArrowUp') && gameRunning) bird.vy = -12;
            });

            function update() {
                bird.vy += 0.6;
                bird.y += bird.vy;

                if(bird.y < 0 || bird.y > 600) {
                    gameRunning = false;
                    alert(`🐦 GAME OVER!\nScore: ${score}`);
                    closeGame();
                    return false;
                }

                if(pipes.length === 0 || pipes[pipes.length - 1].x < 150) {
                    const gap = 100;
                    const minY = 50;
                    const maxY = 400;
                    const gapY = minY + Math.random() * (maxY - minY);
                    pipes.push({x: 400, gapY: gapY, gap: gap});
                }

                pipes.forEach(p => {
                    p.x -= 5;

                    if(50 + 20 > p.x && 50 < p.x + 60) {
                        if(bird.y < p.gapY || bird.y + 20 > p.gapY + p.gap) {
                            gameRunning = false;
                            alert(`🐦 GAME OVER!\nScore: ${score}`);
                            closeGame();
                        }
                    }

                    if(p.x === 30 && !p.scored) {
                        p.scored = true;
                        score++;
                    }
                });

                pipes = pipes.filter(p => p.x > -60);
                return true;
            }

            function draw() {
                ctx.fillStyle = '#87CEEB';
                ctx.fillRect(0, 0, 400, 600);

                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(50, bird.y, 12, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#228B22';
                pipes.forEach(p => {
                    ctx.fillRect(p.x, 0, 60, p.gapY);
                    ctx.fillRect(p.x, p.gapY + p.gap, 60, 600 - p.gapY - p.gap);
                });

                ctx.fillStyle = '#000';
                ctx.font = 'bold 20px Arial';
                ctx.fillText(`Score: ${score}`, 15, 35);
            }

            function loop() {
                if(update()) {
                    draw();
                    requestAnimationFrame(loop);
                }
            }
            loop();
        }

        // ===== BREAKOUT =====
        function breakoutGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 500; canvas.height = 400;
            canvas.style.background = '#1a1a2e';
            canvas.style.border = '3px solid #00d9ff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let paddle = {x: 200, y: 360, w: 100, h: 15, dx: 0};
            let ball = {x: 250, y: 200, r: 8, dx: 4, dy: -4};
            let bricks = [];
            let score = 0;

            for(let i = 0; i < 5; i++) {
                for(let j = 0; j < 5; j++) {
                    bricks.push({x: j * 100, y: i * 25, w: 95, h: 20, active: true});
                }
            }

            document.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowLeft') paddle.dx = -7;
                if(e.key === 'ArrowRight') paddle.dx = 7;
            });
            document.addEventListener('keyup', () => paddle.dx = 0);

            function update() {
                paddle.x += paddle.dx;
                if(paddle.x < 0) paddle.x = 0;
                if(paddle.x + paddle.w > 500) paddle.x = 500 - paddle.w;

                ball.x += ball.dx;
                ball.y += ball.dy;

                if(ball.x - ball.r < 0 || ball.x + ball.r > 500) ball.dx = -ball.dx;
                if(ball.y - ball.r < 0) ball.dy = -ball.dy;

                if(ball.y + ball.r > paddle.y && ball.x > paddle.x && ball.x < paddle.x + paddle.w && ball.dy > 0) {
                    ball.dy = -ball.dy;
                }

                bricks.forEach(b => {
                    if(b.active && ball.x > b.x && ball.x < b.x + b.w && ball.y > b.y && ball.y < b.y + b.h) {
                        b.active = false;
                        ball.dy = -ball.dy;
                        score += 100;
                    }
                });

                if(ball.y > 400) {
                    alert(`💥 GAME OVER!\nScore: ${score}`);
                    closeGame();
                    return false;
                }

                if(bricks.every(b => !b.active)) {
                    alert(`🎉 LEVEL VOLTOOID!\nScore: ${score}`);
                    closeGame();
                    return false;
                }

                return true;
            }

            function draw() {
                ctx.fillStyle = '#1a1a2e';
                ctx.fillRect(0, 0, 500, 400);

                ctx.fillStyle = '#00d9ff';
                ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);

                ctx.fillStyle = '#ffbe0b';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fill();

                bricks.forEach(b => {
                    if(b.active) {
                        ctx.fillStyle = '#ff006e';
                        ctx.fillRect(b.x, b.y, b.w, b.h);
                    }
                });

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(`Score: ${score}`, 15, 25);
            }

            function loop() {
                if(update()) {
                    draw();
                    requestAnimationFrame(loop);
                }
            }
            loop();
        }

        // ===== HANGMAN =====
        function hangmanGame(container) {
            const words = ['javascript', 'programmeren', 'gamedesign', 'website', 'computer', 'awesome'];
            const word = words[Math.floor(Math.random() * words.length)];
            let guessed = [], wrong = [];

            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.padding = '30px';

            const display = document.createElement('div');
            display.style.fontSize = '2rem';
            display.style.margin = '20px 0';
            display.style.letterSpacing = '10px';
            display.style.fontFamily = 'monospace';
            display.style.color = '#00d9ff';

            const input = document.createElement('input');
            input.type = 'text';
            input.maxLength = '1';
            input.placeholder = 'Letter';
            input.style.padding = '10px';
            input.style.fontSize = '18px';
            input.style.borderRadius = '5px';
            input.style.border = '2px solid #00d9ff';

            const button = document.createElement('button');
            button.textContent = 'Gok!';
            button.style.padding = '10px 20px';
            button.style.marginLeft = '10px';
            button.style.background = '#ff006e';
            button.style.color = 'white';
            button.style.border = 'none';
            button.style.borderRadius = '5px';
            button.style.cursor = 'pointer';

            const status = document.createElement('div');
            status.style.fontSize = '16px';
            status.style.marginTop = '20px';

            button.onclick = () => {
                const letter = input.value.toLowerCase();
                input.value = '';
                if(!letter || guessed.includes(letter) || wrong.includes(letter)) return;

                if(word.includes(letter)) guessed.push(letter);
                else wrong.push(letter);
                update();
            };

            function update() {
                display.textContent = word.split('').map(l => guessed.includes(l) ? l : '_').join(' ');
                status.innerHTML = `<p>❌ Fout: ${wrong.length}/6 - ${wrong.join(', ')}</p>`;

                if(wrong.length >= 6) {
                    status.innerHTML += `<p>😢 Game Over! Woord: ${word}</p>`;
                    input.disabled = true;
                    button.disabled = true;
                }

                if(word.split('').every(l => guessed.includes(l))) {
                    status.innerHTML += '<p>🎉 GEWONNEN!</p>';
                    input.disabled = true;
                    button.disabled = true;
                }
            }

            div.appendChild(display);
            div.appendChild(document.createElement('br'));
            div.appendChild(input);
            div.appendChild(button);
            div.appendChild(status);
            container.appendChild(div);
            update();
        }

        // ===== 2048 =====
        function game2048(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 340; canvas.height = 340;
            canvas.style.margin = '20px auto';
            canvas.style.display = 'block';
            canvas.style.border = '2px solid #00d9ff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let board = Array(16).fill(0);
            board[0] = 2;

            const colors = {0: '#cdc1b4', 2: '#eee4da', 4: '#ede0c8', 8: '#f2b179', 16: '#f59563', 32: '#f67c5f', 64: '#f65e3b', 128: '#edcf72', 256: '#edcc61', 512: '#edc850', 1024: '#edc53f', 2048: '#edc22e'};

            document.addEventListener('keydown', (e) => {
                if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                    e.preventDefault();
                    if(e.key === 'ArrowLeft') moveLeft();
                    if(e.key === 'ArrowRight') moveRight();
                    if(e.key === 'ArrowUp') moveUp();
                    if(e.key === 'ArrowDown') moveDown();
                }
            });

            function move(arr) {
                let result = arr.filter(x => x);
                for(let i = 0; i < result.length - 1; i++) {
                    if(result[i] === result[i+1]) {
                        result[i] *= 2;
                        result.splice(i+1, 1);
                    }
                }
                while(result.length < 4) result.push(0);
                return result;
            }

            function moveLeft() {
                for(let i = 0; i < 4; i++) {
                    let row = [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]];
                    row = move(row);
                    [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]] = row;
                }
                draw();
            }

            function moveRight() {
                for(let i = 0; i < 4; i++) {
                    let row = [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]].reverse();
                    row = move(row);
                    row = row.reverse();
                    [board[i*4], board[i*4+1], board[i*4+2], board[i*4+3]] = row;
                }
                draw();
            }

            function moveUp() {
                for(let i = 0; i < 4; i++) {
                    let col = [board[i], board[i+4], board[i+8], board[i+12]];
                    col = move(col);
                    [board[i], board[i+4], board[i+8], board[i+12]] = col;
                }
                draw();
            }

            function moveDown() {
                for(let i = 0; i < 4; i++) {
                    let col = [board[i+12], board[i+8], board[i+4], board[i]];
                    col = move(col);
                    [board[i+12], board[i+8], board[i+4], board[i]] = col;
                }
                draw();
            }

            function draw() {
                ctx.fillStyle = '#bbada0';
                ctx.fillRect(0, 0, 340, 340);

                board.forEach((val, i) => {
                    const x = (i % 4) * 85 + 5;
                    const y = Math.floor(i / 4) * 85 + 5;
                    ctx.fillStyle = colors[val] || '#3c3c2f';
                    ctx.fillRect(x, y, 75, 75);
                    if(val) {
                        ctx.fillStyle = val > 4 ? '#776e65' : '#f9f6f2';
                        ctx.font = 'bold 32px Arial';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(val, x + 37, y + 37);
                    }
                });
            }
            draw();
        }

        // ===== MATCH COLORS =====
        function matchGame(container) {
            const colors = ['#ff006e', '#00d9ff', '#8338ec', '#ffbe0b', '#00ff41'];
            let currentColor = colors[Math.floor(Math.random() * colors.length)];
            let score = 0;

            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.padding = '30px';

            const colorBox = document.createElement('div');
            colorBox.style.width = '150px';
            colorBox.style.height = '150px';
            colorBox.style.margin = '20px auto';
            colorBox.style.background = currentColor;
            colorBox.style.borderRadius = '10px';

            const buttons = document.createElement('div');
            buttons.style.display = 'grid';
            buttons.style.gridTemplateColumns = 'repeat(2, 80px)';
            buttons.style.gap = '10px';
            buttons.style.margin = '20px auto';
            buttons.style.width = 'fit-content';

            const scoreDiv = document.createElement('div');
            scoreDiv.style.fontSize = '24px';
            scoreDiv.style.fontWeight = 'bold';
            scoreDiv.style.marginBottom = '20px';

            function newRound() {
                currentColor = colors[Math.floor(Math.random() * colors.length)];
                const opts = [...colors].sort(() => Math.random() - 0.5);
                buttons.innerHTML = '';

                opts.forEach(col => {
                    const btn = document.createElement('button');

                    btn.style.height = '80px';

            div.appendChild(colorBox);

        // ===== ASTEROID =====
        function asteroidGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 500; canvas.height = 500;
            canvas.style.background = '#000';
            canvas.style.border = '3px solid #00d9ff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let player = {x: 250, y: 450, angle: 0};
            let bullets = [];
            let asteroids = [];
            let score = 0;

            for(let i = 0; i < 5; i++) {
                asteroids.push({
                    x: Math.random() * 500,
                    y: Math.random() * 200,
                    vx: (Math.random() - 0.5) * 3,
                    vy: (Math.random() - 0.5) * 3,
                    size: 3
                });
            }

            document.addEventListener('keydown', (e) => {
                if(e.key === 'ArrowLeft') player.angle -= 0.1;
                if(e.key === 'ArrowRight') player.angle += 0.1;
                if(e.key === ' ') {
                    bullets.push({x: player.x, y: player.y, vx: Math.cos(player.angle) * 7, vy: Math.sin(player.angle) * 7});
                    e.preventDefault();
                }
            });

            function update() {
                asteroids.forEach(a => {
                    a.x += a.vx;
                    a.y += a.vy;
                    if(a.x < 0) a.x = 500;
                    if(a.x > 500) a.x = 0;
                    if(a.y < 0) a.y = 500;
                    if(a.y > 500) a.y = 0;
                });

                bullets.forEach((b, i) => {
                    b.x += b.vx;
                    b.y += b.vy;
                    if(b.x < 0 || b.x > 500 || b.y < 0 || b.y > 500) bullets.splice(i, 1);
                });

                asteroids.forEach((a, ai) => {
                    bullets.forEach((b, bi) => {
                        if(Math.hypot(a.x - b.x, a.y - b.y) < a.size * 10) {
                            asteroids.splice(ai, 1);
                            bullets.splice(bi, 1);
                            score += 100;
                        }
                    });
                });

                asteroids.forEach(a => {
                    if(Math.hypot(a.x - player.x, a.y - player.y) < a.size * 10) {
                        alert(`🪨 GAME OVER!\nScore: ${score}`);
                        closeGame();
                    }
                });

                if(asteroids.length === 0) {
                    alert(`🎉 LEVEL VOLTOOID!\nScore: ${score}`);
                    closeGame();
                }

                return true;
            }

            function draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 500, 500);

                ctx.save();
                ctx.translate(player.x, player.y);
                ctx.rotate(player.angle);
                ctx.fillStyle = '#00d9ff';
                ctx.beginPath();
                ctx.moveTo(15, 0);
                ctx.lineTo(-10, -10);
                ctx.lineTo(-5, 0);
                ctx.lineTo(-10, 10);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                ctx.fillStyle = '#ffbe0b';
                asteroids.forEach(a => {
                    ctx.beginPath();
                    ctx.arc(a.x, a.y, a.size * 10, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.fillStyle = '#ff006e';
                bullets.forEach(b => {
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                    ctx.fill();
                });

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 18px Arial';
                ctx.fillText(`Score: ${score}`, 15, 25);
            }

            function loop() {
                if(update()) {
                    draw();
                    requestAnimationFrame(loop);
                }
            }
            loop();
        }

        // ===== PONG 2P =====
        function pongGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 600; canvas.height = 400;
            canvas.style.background = '#000';
            canvas.style.border = '3px solid #fff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            let p1 = {y: 150, score: 0};
            let p2 = {y: 150, score: 0};
            let ball = {x: 300, y: 200, vx: 4, vy: 4, r: 8};

            const info = document.createElement('div');
            info.style.color = '#fff';
            info.style.marginBottom = '20px';
            info.textContent = '👤 P1: W/S | 👤 P2: ↑↓';
            container.insertBefore(info, canvas);

            document.addEventListener('keydown', (e) => {
                if(e.key === 'w' && p1.y > 0) p1.y -= 7;
                if(e.key === 's' && p1.y < 340) p1.y += 7;
                if(e.key === 'ArrowUp' && p2.y > 0) p2.y -= 7;
                if(e.key === 'ArrowDown' && p2.y < 340) p2.y += 7;
            });

            function update() {
                ball.x += ball.vx;
                ball.y += ball.vy;

                if(ball.y < 0 || ball.y > 400) ball.vy = -ball.vy;

                if(ball.x < 20 && ball.y > p1.y && ball.y < p1.y + 60) {
                    ball.vx = -ball.vx;
                    p1.score++;
                }

                if(ball.x > 580 && ball.y > p2.y && ball.y < p2.y + 60) {
                    ball.vx = -ball.vx;
                    p2.score++;
                }

                if(ball.x < 0 || ball.x > 600) {
                    alert(`Game Over!\n👤 P1: ${p1.score}\n👤 P2: ${p2.score}`);
                    closeGame();
                }
            }

            function draw() {
                ctx.fillStyle = '#000';
                ctx.fillRect(0, 0, 600, 400);

                ctx.fillStyle = '#fff';
                ctx.fillRect(10, p1.y, 10, 60);
                ctx.fillRect(580, p2.y, 10, 60);
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fill();

                ctx.font = 'bold 30px Arial';
                ctx.fillText(p1.score, 100, 50);
                ctx.fillText(p2.score, 450, 50);
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }
            loop();
        }

        // ===== TIC TAC TOE =====
        function tictactoeGame(container) {
            let board = Array(9).fill('');
            let turn = 'X';

            const info = document.createElement('div');
            info.style.color = '#fff';
            info.style.marginBottom = '20px';
            info.textContent = '👤 P1 (X) vs 👤 P2 (O)';
            container.appendChild(info);

            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = 'repeat(3, 80px)';
            grid.style.gap = '5px';
            grid.style.margin = '20px auto';
            grid.style.width = 'fit-content';

            const cells = board.map((_, i) => {
                const cell = document.createElement('button');
                cell.style.width = '80px';
                cell.style.height = '80px';
                cell.style.fontSize = '32px';
                cell.style.fontWeight = 'bold';
                cell.style.background = 'linear-gradient(45deg, #ff006e, #8338ec)';
                cell.style.color = 'white';
                cell.style.border = 'none';
                cell.style.borderRadius = '8px';
                cell.style.cursor = 'pointer';

                cell.onclick = () => {
                    if(board[i] === '') {
                        board[i] = turn;
                        cell.textContent = turn;
                        cell.disabled = true;

                        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                        if(lines.some(([a, b, c]) => board[a] === turn && board[b] === turn && board[c] === turn)) {
                            alert(`🎉 ${turn === 'X' ? 'P1' : 'P2'} WINT!`);
                            closeGame();
                            return;
                        }

                        turn = turn === 'X' ? 'O' : 'X';
                        info.textContent = `👤 Beurt: ${turn}`;

                        if(board.every(c => c !== '')) {
                            alert('🤝 Gelijkspel!');
                            closeGame();
                        }
                    }
                };
                return cell;
            });

            cells.forEach(c => grid.appendChild(c));
            container.appendChild(grid);
        }

        // ===== SOCCER 2P =====
        function soccerGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 600; canvas.height = 400;
            canvas.style.background = '#228B22';
            canvas.style.border = '3px solid #fff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            const info = document.createElement('div');
            info.style.color = '#fff';
            info.style.marginBottom = '20px';
            info.textContent = '👤 P1: W/A/S/D | 👤 P2: ↑←↓→';
            container.insertBefore(info, canvas);

            let p1 = {x: 100, y: 150, r: 10, score: 0};
            let p2 = {x: 500, y: 150, r: 10, score: 0};
            let ball = {x: 300, y: 200, vx: 0, vy: 0, r: 6};
            const keys = {};

            document.addEventListener('keydown', (e) => keys[e.key] = true);
            document.addEventListener('keyup', (e) => keys[e.key] = false);

            function update() {
                if(keys['w'] && p1.y > 0) p1.y -= 5;
                if(keys['s'] && p1.y < 390) p1.y += 5;
                if(keys['a'] && p1.x > 0) p1.x -= 5;
                if(keys['d'] && p1.x < 300) p1.x += 5;

                if(keys['ArrowUp'] && p2.y > 0) p2.y -= 5;
                if(keys['ArrowDown'] && p2.y < 390) p2.y += 5;
                if(keys['ArrowLeft'] && p2.x > 300) p2.x -= 5;
                if(keys['ArrowRight'] && p2.x < 600) p2.x += 5;

                if(Math.hypot(ball.x - p1.x, ball.y - p1.y) < 20) {
                    ball.vx = 5;
                    ball.vy = (ball.y - p1.y) / 10;
                }

                if(Math.hypot(ball.x - p2.x, ball.y - p2.y) < 20) {
                    ball.vx = -5;
                    ball.vy = (ball.y - p2.y) / 10;
                }

                ball.x += ball.vx;
                ball.y += ball.vy;

                if(ball.y < 0 || ball.y > 400) ball.vy = -ball.vy;

                if(ball.x < 0) {
                    p2.score++;
                    ball = {x: 300, y: 200, vx: 0, vy: 0, r: 6};
                }
                if(ball.x > 600) {
                    p1.score++;
                    ball = {x: 300, y: 200, vx: 0, vy: 0, r: 6};
                }
            }

            function draw() {
                ctx.fillStyle = '#228B22';
                ctx.fillRect(0, 0, 600, 400);

                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(300, 0);
                ctx.lineTo(300, 400);
                ctx.stroke();

                ctx.fillStyle = '#ff006e';
                ctx.beginPath();
                ctx.arc(p1.x, p1.y, p1.r, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#00d9ff';
                ctx.beginPath();
                ctx.arc(p2.x, p2.y, p2.r, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
                ctx.fill();

                ctx.font = 'bold 30px Arial';
                ctx.fillText(p1.score, 100, 50);
                ctx.fillText(p2.score, 450, 50);
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }
            loop();
        }

        // ===== RACING 2P =====
        function racingGame(container) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 500;
            canvas.style.background = '#333';
            canvas.style.border = '3px solid #fff';
            container.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            const info = document.createElement('div');
            info.style.color = '#fff';
            info.style.marginBottom = '20px';
            info.textContent = '👤 P1: A/D | 👤 P2: ←→';
            container.insertBefore(info, canvas);

            let p1 = {x: 80, y: 450, speed: 0};
            let p2 = {x: 320, y: 450, speed: 0};
            let obstacles = [];
            let p1Pos = 0, p2Pos = 0;
            const keys = {};

            document.addEventListener('keydown', (e) => keys[e.key] = true);
            document.addEventListener('keyup', (e) => keys[e.key] = false);

            function update() {
                if(keys['a'] && p1.x > 50) p1.x -= 5;
                if(keys['d'] && p1.x < 200) p1.x += 5;
                if(keys['ArrowLeft'] && p2.x > 250) p2.x -= 5;
                if(keys['ArrowRight'] && p2.x < 350) p2.x += 5;

                p1Pos++;
                p2Pos++;

                if(Math.random() < 0.02) {
                    obstacles.push({x: Math.random() < 0.5 ? 80 : 320, y: -30});
                }

                obstacles.forEach((o, i) => {
                    o.y += 5;

                    if(o.x === p1.x && o.y > 440 && o.y < 480) {
                        alert(`⚠️ P2 WINS!\nP1: ${p1Pos}m | P2: ${p2Pos}m`);
                        closeGame();
                    }

                    if(o.x === p2.x && o.y > 440 && o.y < 480) {
                        alert(`⚠️ P1 WINS!\nP1: ${p1Pos}m | P2: ${p2Pos}m`);
                        closeGame();
                    }

                    if(o.y > 500) obstacles.splice(i, 1);
                });
            }

            function draw() {
                ctx.fillStyle = '#333';
                ctx.fillRect(0, 0, 400, 500);

                ctx.fillStyle = '#ffff00';
                for(let i = 0; i < 500; i += 50) {
                    ctx.fillRect(198, i, 4, 30);
                }

                ctx.fillStyle = '#ff006e';
                ctx.fillRect(p1.x - 15, p1.y, 30, 40);

                ctx.fillStyle = '#00d9ff';
                ctx.fillRect(p2.x - 15, p2.y, 30, 40);

                ctx.fillStyle = '#ff0000';
                obstacles.forEach(o => ctx.fillRect(o.x - 15, o.y, 30, 30));

                ctx.fillStyle = '#fff';
                ctx.font = 'bold 16px Arial';
                ctx.fillText(`P1: ${p1Pos}m`, 15, 30);
                ctx.fillText(`P2: ${p2Pos}m`, 300, 30);
            }

            function loop() {
                update();
                draw();
                requestAnimationFrame(loop);
            }
            loop();
        }

        // ===== CONNECT 4 =====
        function connect4Game(container) {
            let board = Array(42).fill('');
            let turn = 1;

            const info = document.createElement('div');
            info.style.color = '#fff';
            info.style.marginBottom = '20px';
            info.textContent = '👤 P1 (🔴) vs 👤 P2 (🟡)';
            container.appendChild(info);

            const grid = document.createElement('div');
            grid.style.display = 'grid';
            grid.style.gridTemplateColumns = 'repeat(7, 50px)';
            grid.style.gap = '5px';
            grid.style.margin = '20px auto';
            grid.style.width = 'fit-content';

            const cells = board.map((_, i) => {
                const cell = document.createElement('button');
                cell.style.width = '50px';
                cell.style.height = '50px';
                cell.style.fontSize = '24px';
                cell.style.background = '#0066cc';
                cell.style.border = '2px solid #fff';
                cell.style.borderRadius = '50%';
                cell.style.cursor = 'pointer';

                cell.onclick = () => {
                    const col = i % 7;
                    for(let row = 5; row >= 0; row--) {
                        const idx = row * 7 + col;
                        if(board[idx] === '') {
                            board[idx] = turn === 1 ? '🔴' : '🟡';
                            cell.textContent = board[idx];

                            for(let r = 0; r < 6; r++) {
                                for(let c = 0; c < 4; c++) {
                                    if(board[r*7+c] === board[idx] && board[r*7+c+1] === board[idx] && board[r*7+c+2] === board[idx] && board[r*7+c+3] === board[idx]) {
                                        alert(`🎉 ${turn === 1 ? 'P1' : 'P2'} WINT!`);
                                        closeGame();
                                        return;
                                    }
                                }
                            }

                            turn = turn === 1 ? 2 : 1;
                            info.textContent = `👤 Beurt: P${turn} ${turn === 1 ? '🔴' : '🟡'}`;
                            return;
                        }
                    }
                };
                return cell;
            });

            cells.forEach(c => grid.appendChild(c));
            container.appendChild(grid);
        }

        // ===== QUIZ =====
        function quizGame(container) {
            const questions = [
                {q: 'Wat is 2+2?', a: '4'},
                {q: 'Hoofdstad Nederland?', a: 'amsterdam'},
                {q: 'Largest ocean?', a: 'pacific'},
                {q: 'How many planets?', a: '8'},
                {q: 'Fastest land animal?', a: 'cheetah'}
            ];

            const info = document.createElement('div');
            info.style.color = '#fff';
            info.style.marginBottom = '20px';
            info.textContent = '👤 P1 vs 👤 P2';
            container.appendChild(info);

            let p1Score = 0, p2Score = 0, current = 0, turn = 1;

            const div = document.createElement('div');
            div.style.textAlign = 'center';
            div.style.padding = '20px';

            const question = document.createElement('div');
            question.style.fontSize = '18px';
            question.style.marginBottom = '20px';
            question.style.fontWeight = 'bold';

            const input = document.createElement('input');
            input.type = 'text';
            input.placeholder = 'Answer...';
            input.style.padding = '10px';
            input.style.fontSize = '16px';
            input.style.borderRadius = '5px';
            input.style.border = '2px solid #00d9ff';
            input.style.marginRight = '10px';
            input.style.width = '200px';

            const button = document.createElement('button');
            button.textContent = 'Check!';
            button.style.padding = '10px 20px';
            button.style.background = '#ff006e';
            button.style.color = 'white';
            button.style.border = 'none';
            button.style.borderRadius = '5px';
            button.style.cursor = 'pointer';

            button.onclick = () => {
                const ans = input.value.toLowerCase().trim();
                input.value = '';

                if(ans === questions[current].a) {
                    if(turn === 1) p1Score++;
                    else p2Score++;
                    alert(`✓ Correct! P${turn} gets a point!`);
                } else {
                    alert(`✗ Wrong! Answer: ${questions[current].a}`);
                }

                current++;
                turn = turn === 1 ? 2 : 1;

                if(current >= questions.length) {
                    alert(`Game Over!\nP1: ${p1Score} | P2: ${p2Score}`);
                    closeGame();
                    return;
                }

                question.textContent = `[P${turn}] ${questions[current].q}`;
            };

            div.appendChild(question);
            div.appendChild(input);
            div.appendChild(button);
            container.appendChild(div);

            question.textContent = `[P1] ${questions[0].q}`;
        }

        // Start
        window.onload = init;
    </script>
